<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Juguetes | Julio Cepeda</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/catalogo.css">
</head>
<body>

    <header style="padding: 20px; text-align: center; border-bottom: 2px solid #ccc;">
        <h2>Encabezado Temporal</h2>
        <button id="btn-theme" aria-label="Cambiar tema visual">🌙 Cambiar Tema</button>
    </header>

    <main class="catalogo-main">
        <section class="contenedor">
            <h1 class="titulo-pagina">Juguetes Destacados</h1>
            
            <div class="grid-productos">
                
                <article class="tarjeta-producto">
                    <img src="./img/bici-roja.jpg" alt="Bicicleta Infantil Roja" class="producto-img">
                    <div class="producto-info">
                        <h3 class="producto-titulo">Bicicleta Infantil Roja</h3>
                        <p class="producto-precio">$1,299.00</p>
                        <button class="btn-primario" aria-label="Agregar Bicicleta Infantil Roja al carrito">Agregar al Carrito</button>
                    </div>
                </article>

                <article class="tarjeta-producto">
                    <img src="./img/lego-halcon.jpg" alt="Lego Halcón Milenario"class="producto-img">
                    <div class="producto-info">
                        <h3 class="producto-titulo">Lego Star Wars</h3>
                        <p class="producto-precio">$3,499.00</p>
                        <button class="btn-primario" aria-label="Agregar Lego Star Wars al carrito">Agregar al Carrito</button>
                    </div>
                </article>
                
            </div>
        </section>
    </main>

    <footer style="background: #343a40; color: white; padding: 20px; text-align: center; margin-top: 40px;">
        <p>Pie de página temporal</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
